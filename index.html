<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskar Dongare</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="glass">
  <div class="logo">S</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="hero-text">
    <h1>Hello, I'm <span>Sanskar Dongare</span></h1>
    <p>Frontend Developer | UI Designer</p>

    <div class="hero-buttons">
      <!-- ✅ FIXED -->
      <a href="resume.pdf" download class="btn">Download Resume</a>
      <a href="#projects" class="btn outline">View Projects</a>
    </div>

    <p class="status">Open to internships and opportunities</p>
  </div>

  <div class="glass hero-img">
    <img src="profile.jpg" alt="profile">
  </div>
</section>

<!-- CERTIFICATES -->
<section class="section">
  <h2>Certificates</h2>

  <div class="certificates">

    <!-- ✅ UPDATED -->
    <div class="cert-card glass">
      <img src="java.png" onclick="openImage(this.src)">
      <p>Java</p>
      <a href="java.png" download class="download-btn">Download</a>
    </div>

    <div class="cert-card glass">
      <img src="python.png" onclick="openImage(this.src)">
      <p>Python</p>
      <a href="python.png" download class="download-btn">Download</a>
    </div>

    <div class="cert-card glass">
      <img src="ds.png" onclick="openImage(this.src)">
      <p>Data Structures</p>
      <a href="ds.png" download class="download-btn">Download</a>
    </div>

  </div>
</section>

<!-- ✅ ADD THIS MODAL -->
<div id="imgModal" class="modal">
  <span class="close" onclick="closeImage()">&times;</span>
  <img class="modal-content" id="modalImg">
</div>

<script src="script.js"></script>
</body>
</html>
